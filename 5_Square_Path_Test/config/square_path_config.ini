# Square path voice test config
voice_port=/dev/ttyS1
baud=115200

# Current wiring: /dev/zf_pwm_motor_1/2 are physical DIR, /dev/zf_gpio_motor_1/2 are physical PWM pulses.
motor1_forward_dir=0
motor2_forward_dir=0

# Steering servo. A car chassis cannot spin in place; this uses steer + forward motion for each corner.
# Servo calibration: this rear-facing servo linkage steers left at higher angles.
# The software center is trimmed above 90 deg because lower angles moved further right.
servo_center_deg=95
servo_left_deg=110
servo_right_deg=80
servo_settle_ms=300
turn_direction=right

# Tuned one step up from the first slow test.
# Straight and turning use different pulse settings because steering increases load.
side_counts=65
turn_counts_90=90
straight_pulse_on_ms=8
straight_pulse_off_ms=40
turn_pulse_on_ms=10
turn_pulse_off_ms=30
action_timeout_ms=8000
turn_action_timeout_ms=12000
max_encoder_delta=30
corner_pause_ms=500
square_loops=1
require_start=0
stop_on_any_voice_during_motion=1

# IMU-assisted corner stop. IMU660RA gyro raw / 16.4 = deg/s at the default 2000dps range.
# Stop a little before 90 deg to reduce mechanical overshoot after motor cutoff.
imu_enabled=1
imu_turn_target_deg=86
imu_gyro_divisor=16.4
imu_gyro_deadband_dps=1.5
imu_calibration_samples=80
imu_calibration_delay_ms=5
imu_sample_ms=10
imu_min_turn_ms=300

cmd_start=AA 55 03 00 FB
cmd_stop=AA 55 00 01 FB
cmd_run_square=AA 55 00 04 FB
cmd_run_side=AA 55 00 05 FB
# The voice module labels are opposite to the chassis steering direction on this car.
cmd_turn_left=AA 55 00 07 FB
cmd_turn_right=AA 55 00 06 FB
