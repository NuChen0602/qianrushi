project_root: ~/Library_Patrol_Project
nav_project: ~/Library_Patrol_Project/robot_2k03011/robot_2k0301
vision_project: ~/Library_Patrol_Project/LS2K0301_Library/LS2K030x_Library/Example/Motherboard_Demo/E8_camera/E08_04_shelf_book_vision_demo

board:
  ip: 192.168.123.70
  ssh_user: root

navigation:
  dashboard_url: http://127.0.0.1:8080
  map_api: /api/map
  state_api: /api/state
  goal_api: /api/goal
  patrol_api: /api/patrol/start
  cancel_api: /api/cancel
  emergency_stop_api: /api/emergency-stop
  emergency_release_api: /api/emergency-release
  goal_timeout_seconds: 180
  patrol_timeout_seconds: 900

demo_web:
  host: 0.0.0.0
  port: 8090

camera:
  board_host: 192.168.123.70
  board_port: 5000
  mjpeg_fps: 12
  enabled: true

vision:
  lost_item_api_url: http://127.0.0.1:8091/api/vision/lost_items
  allow_stub: false
  book_timeout_seconds: 8
  book_confirm_frames: 3
  shelf_timeout_seconds: 3.0
  shelf_confirm_frames: 2

dht11:
  iio_root: /sys/bus/iio/devices

voice:
  enabled: false
  mode: disabled
  serial_port: /dev/ttyS1
  baudrate: 115200

tts:
  enabled: true
  mode: ssh
  serial_port: /dev/ttyS0
  baudrate: 115200
  board_host: 192.168.123.70
  board_user: root
  accept_timeout_seconds: 3
  completion_timeout_seconds: 120
