missions:
  RECOMMEND_BOOKS:
    title: 推荐文学小说
    type: simple_speech
    speech: RECOMMEND_BOOKS
  SHELF_CHECK:
    title: 书架错放巡检
    type: patrol
    start_speech: SHELF_CHECK_START
    patrol_pause_seconds: 3.5
    route:
    - ENG_SHELF_B1
    - ENG_TO_SCI_MID
    - SCI_SHELF_C1
    - SCI_TO_LIT_MID
    - LIT_SHELF_A3
    point_events:
      ENG_SHELF_B1:
        vision_mode: shelf_misplaced
      SCI_SHELF_C1:
        vision_mode: shelf_misplaced
      LIT_SHELF_A3:
        vision_mode: shelf_misplaced
  LOST_ITEM_PATROL:
    title: 全图遗失物巡检
    type: patrol
    start_speech: LOST_PATROL_START
    route:
    - LOST_KEY_POINT
    - HAZARD_3_EXIT
    - START_HOME
    point_events:
      LOST_KEY_POINT:
        vision_mode: lost
        work_order: 发现钥匙和校园卡，请及时拾取
        speech: LOST_KEY_FOUND
  HAZARD_CHECK:
    title: 高危点位检查
    type: patrol
    start_speech: HAZARD_START
    route:
    - HAZARD_1_SOCKET
    - HAZARD_2_FIRE
    - HAZARD_3_EXIT
    - START_HOME
    point_events:
      HAZARD_2_FIRE:
        vision_mode: fire
        work_order: 传感器异常，存在起火风险
        speech: HAZARD_FIRE
    point_actions:
      HAZARD_2_FIRE:
        work_order: 传感器异常，存在起火风险
  FULL_PATROL:
    title: 全图综合巡检
    type: patrol
    start_speech: FULL_PATROL_START
    route:
    - ENG_SHELF_B1
    - ENG_TO_SCI_MID
    - SCI_SHELF_C1
    - SCI_TO_LIT_MID
    - LIT_SHELF_A3
    - LOST_KEY_POINT
    - HAZARD_1_SOCKET
    - HAZARD_2_FIRE
    - HAZARD_3_EXIT
    - START_HOME
  RETURN_HOME:
    title: 返回起点
    type: goto
    point: START_HOME
  CANCEL:
    title: 停止当前任务
    type: cancel
