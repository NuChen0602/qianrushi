# Library Patrol voice motion test config
# Voice command frames are learned on the board by:
#   ./voice_motion_test learn --config /home/root/voice_motion_config.ini

voice_port=/dev/ttyS1
baud=115200

# Current motor wiring is DIR/PWM swapped.
# /dev/zf_pwm_motor_1/2 are used as physical DIR.
# /dev/zf_gpio_motor_1/2 are used as physical PWM pulses.
motor1_forward_dir=0
motor2_forward_dir=0

# Front steering servo. Left/right commands steer first, move shortly, then center.
servo_center_deg=92
servo_left_deg=107
servo_right_deg=77
servo_settle_ms=300

# UDP agent mode for PC/ROS real-robot bridge.
agent_bind_port=15000
agent_status_period_ms=1000

# Desktop-safe defaults. Lower counts make each command shorter.
forward_counts=25
turn_counts=16
pulse_on_ms=40
pulse_off_ms=120
action_timeout_ms=5000
max_encoder_delta=20

cmd_start=AA 55 03 00 FB
cmd_stop=AA 55 00 01 FB
cmd_forward=AA 55 00 04 FB
cmd_back=AA 55 00 05 FB
# The voice module labels are opposite to the chassis steering direction on this car.
cmd_left=AA 55 00 07 FB
cmd_right=AA 55 00 06 FB
