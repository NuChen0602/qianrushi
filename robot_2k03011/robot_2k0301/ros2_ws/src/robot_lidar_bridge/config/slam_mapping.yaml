slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.02
    max_laser_range: 2.5
    min_laser_range: 0.05
    minimum_time_interval: 0.1
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 3.0
    link_match_minimum_response_fine: 0.25
    link_scan_maximum_distance: 0.6
    loop_search_maximum_distance: 1.2
    do_loop_closing: true
    loop_match_minimum_chain_size: 15
    loop_match_maximum_variance_coarse: 1.0
    loop_match_minimum_response_coarse: 0.55
    loop_match_minimum_response_fine: 0.65

    correlation_search_space_dimension: 0.3
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.08
    loop_search_space_dimension: 2.5
    loop_search_space_resolution: 0.02
    loop_search_space_smear_deviation: 0.03
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.5
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: false
