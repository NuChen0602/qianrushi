slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: localization
    map_file_name: maps/library
    # Use the serialized pose graph as the initial reference, so navigation can
    # start from scan-to-map matching instead of requiring RViz 2D Pose Estimate.
    map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 1.0
    minimum_time_interval: 0.05
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    resolution: 0.02
    max_laser_range: 3.0
    min_laser_range: 0.05

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.01
    minimum_travel_heading: 0.01
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 3.0
    link_match_minimum_response_fine: 0.05
    link_scan_maximum_distance: 0.8
    do_loop_closing: true
    loop_match_minimum_chain_size: 8
    loop_match_maximum_variance_coarse: 1.5
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55
    loop_search_maximum_distance: 1.5

    correlation_search_space_dimension: 0.7
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 3.0
    loop_search_space_resolution: 0.03
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.35
    angle_variance_penalty: 0.6
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
